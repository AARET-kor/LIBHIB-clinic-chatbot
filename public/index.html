<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCAUDE Aesthetic Clinic — AI 상담</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8f5f2;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 100dvh;
      max-height: 860px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .clinic-avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #c9a96e, #e8d5b0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .clinic-info h1 { font-size: 16px; font-weight: 600; }
    .clinic-info p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .lang-badges {
      margin-left: auto;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .lang-badge {
      font-size: 10px;
      background: rgba(255,255,255,0.15);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #f3f0ec;
      color: #222;
      border-bottom-left-radius: 4px;
    }

    .msg.assistant.streaming { opacity: 0.85; }

    .msg-time {
      font-size: 10px;
      opacity: 0.4;
      margin-top: 4px;
      text-align: right;
    }

    .typing-indicator {
      align-self: flex-start;
      background: #f3f0ec;
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }

    .dot {
      width: 7px; height: 7px;
      background: #bbb;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .quick-prompts {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-btn {
      font-size: 12px;
      padding: 6px 12px;
      background: #f3f0ec;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      color: #444;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .quick-btn:hover { background: #e8e4df; }

    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #f0ede9;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #fff;
    }

    textarea {
      flex: 1;
      border: 1.5px solid #e8e4df;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: #1a1a2e; }

    button#send {
      width: 44px; height: 44px;
      background: #1a1a2e;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    button#send:hover { opacity: 0.85; }
    button#send:disabled { opacity: 0.4; cursor: default; }

    button#send svg { fill: #fff; }

    .welcome-msg {
      text-align: center;
      color: #aaa;
      font-size: 13px;
      padding: 8px;
    }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="clinic-avatar">✦</div>
    <div class="clinic-info">
      <h1>LCAUDE Clinic AI</h1>
      <p><span class="status-dot"></span>의료 미용 상담 · Aesthetic Consultation</p>
    </div>
    <div class="lang-badges">
      <span class="lang-badge">KO</span>
      <span class="lang-badge">EN</span>
      <span class="lang-badge">ZH</span>
      <span class="lang-badge">AR</span>
      <span class="lang-badge">JA</span>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg assistant">
      안녕하세요! LCAUDE 클리닉 AI 상담사입니다. 시술 궁금한 점이나 피부 고민을 편하게 말씀해 주세요 😊
      <br><br>
      Hello! I'm the LCAUDE Clinic AI consultant. Feel free to ask about any procedures or skin concerns in your language.
    </div>
  </div>

  <div class="typing-indicator" id="typing">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="quick-prompts" id="quickPrompts">
    <button class="quick-btn">보톡스 가격 & 효과</button>
    <button class="quick-btn">Filler for lips?</button>
    <button class="quick-btn">皮肤提升推荐</button>
    <button class="quick-btn">ما هو البوتوكس؟</button>
    <button class="quick-btn">울쎄라 vs 써마지</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="메시지를 입력하세요 / Type your message..." rows="1"></textarea>
    <button id="send">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const typingEl = document.getElementById("typing");
  const quickPrompts = document.getElementById("quickPrompts");

  let conversationHistory = [];

  // 자동 높이 조절
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
  });

  // Enter 전송 (Shift+Enter = 줄바꿈)
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener("click", sendMessage);

  // 빠른 질문 버튼
  quickPrompts.querySelectorAll(".quick-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      inputEl.value = btn.textContent;
      sendMessage();
    });
  });

  function appendMessage(role, text, streaming = false) {
    const div = document.createElement("div");
    div.className = `msg ${role}${streaming ? " streaming" : ""}`;
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function now() {
    return new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    // UI 초기화
    inputEl.value = "";
    inputEl.style.height = "auto";
    quickPrompts.style.display = "none";
    sendBtn.disabled = true;

    // 사용자 메시지 표시
    appendMessage("user", text);
    conversationHistory.push({ role: "user", content: text });

    // 타이핑 표시
    typingEl.classList.add("visible");
    scrollBottom();

    // 스트리밍 응답 버블
    let assistantDiv = null;
    let fullText = "";

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: conversationHistory }),
      });

      if (!response.ok) throw new Error(`Server error: ${response.status}`);

      typingEl.classList.remove("visible");
      assistantDiv = appendMessage("assistant", "", true);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.text) {
              fullText += data.text;
              assistantDiv.textContent = fullText;
              assistantDiv.classList.add("streaming");
              scrollBottom();
            }
            if (data.done) {
              assistantDiv.classList.remove("streaming");
            }
            if (data.error) {
              assistantDiv.textContent = "오류가 발생했습니다. 잠시 후 다시 시도해 주세요.";
            }
          } catch {}
        }
      }

      if (fullText) {
        conversationHistory.push({ role: "assistant", content: fullText });
      }

    } catch (err) {
      typingEl.classList.remove("visible");
      if (!assistantDiv) assistantDiv = appendMessage("assistant", "");
      assistantDiv.textContent = "연결 오류가 발생했습니다. 서버를 확인해 주세요.";
      console.error(err);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
